<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="theme-color" content="#111827">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تقویم روزانه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- استایل واکنش‌گرا (همان استایل دقیق خودتان) -->
<style>
@media(max-width: 768px) {
  body { padding: 12px 8px; padding-bottom: 90px; }
  .header { flex-direction: column; align-items: center; text-align: center; gap: 14px; }
  .logo { font-size: 22px; }
  .date-nav { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; gap: 12px; }
  .date-nav > div:first-of-type { width: 100%; display: flex; justify-content: space-between; align-items: center; order: -1; }
  #date-label { flex: 1; min-width: 0; font-size: 13px; padding: 6px 4px; }
  .card { padding: 14px; border-radius: 12px; }
  .app-nav { position: fixed; bottom: 0; left: 0; right: 0; margin-bottom: 0; border-radius: 20px 20px 0 0; padding: 10px 15px 20px 15px; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); border: none; background: var(--surface); display: flex; gap: 10px; }
  .nav-btn { flex-direction: column; gap: 4px; font-size: 11px; padding: 8px; }
  .nav-icon { font-size: 22px; }
  .mood-container { flex-direction: column; align-items: stretch; } /* فیکس موبایل برای مود */
}
.tab-section { display: none; animation: fadeIn 0.3s ease; }
.tab-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@media(min-width: 769px) { .app-nav { display: flex; gap: 10px; margin-bottom: 20px; background: var(--surface); padding: 10px; border-radius: 16px; border: 1px solid var(--border); } }
.nav-btn { flex: 1; padding: 12px; background: transparent; border: none; border-radius: 10px; color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--accent-glow); color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      تقویم روزانه
    </div>
    <div class="date-nav">
      <div style="display:flex; align-items:center; gap:8px">
        <span id="welcome-msg" style="font-size:13px; color:var(--muted)"></span>
        <button id="notify-enable-btn" style="padding:6px 12px; border-radius:8px; border:1px solid var(--border2); background:var(--surface2); color:var(--muted); cursor:pointer; font-size:11px;">🔔 اعلان‌ها</button>
        <button id="logout-btn" style="padding:6px 14px; border-radius:8px; border:1px solid var(--border2); background:var(--surface2); color:var(--muted); cursor:pointer; font-size:12px;">خروج</button>
      </div>
      <button id="prev-day" title="روز قبل">&#8249;</button>
      <div id="date-label"></div>
      <button id="next-day" title="روز بعد">&#8250;</button>
      <button class="btn-today" id="btn-today">امروز</button>
      
      <!-- منوی رنگ و تم -->
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="color" id="accent-color-picker" title="رنگ دلخواه" style="width:28px; height:28px; border:none; background:transparent; cursor:pointer;">
        <select id="theme-select" class="theme-select" title="تم">
          <option value="auto">خودکار</option>
          <option value="dark">دارک</option>
          <option value="amoled">مشکی مطلق</option>
          <option value="light">لایت</option>
          <option value="pastel">پاستلی</option>
          <option value="forest">سبز</option>
          <option value="sunset">غروب</option>
        </select>
      </div>
    </div>
  </div>

  <!-- App Navigation -->
  <nav class="app-nav">
    <button class="nav-btn active" data-tab="tab-timeline"><span class="nav-icon">📅</span> تایم‌لاین</button>
    <button class="nav-btn" data-tab="tab-habits"><span class="nav-icon">✔️</span> کار و عادت</button>
    <button class="nav-btn" data-tab="tab-add"><span class="nav-icon">⚙️</span> مدیریت</button>
    <button class="nav-btn" data-tab="tab-reports"><span class="nav-icon">📊</span> گزارش‌ها</button>
  </nav>

  <div class="tab-container">
    
    <!-- ================= تب 1: تایم‌لاین ================= -->
    <div id="tab-timeline" class="tab-section active">
      <!-- حال و هوای امروز (منطبق با موبایل) -->
      <div class="card">
        <div class="card-title">حال و هوای امروز من</div>
        <div class="mood-container" style="display:flex; gap:12px; align-items:center;">
          <div id="mood-emojis" style="display:flex; gap:12px;">
            <span class="mood-emoji" data-mood="🤩">🤩</span>
            <span class="mood-emoji" data-mood="😊">😊</span>
            <span class="mood-emoji" data-mood="😐">😐</span>
            <span class="mood-emoji" data-mood="😔">😔</span>
            <span class="mood-emoji" data-mood="😡">😡</span>
          </div>
          <input type="text" id="mood-note" placeholder="یادداشت کوتاه..." style="flex:1;">
          <button id="save-mood-btn" class="action-btn">ثبت مود</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:0">
        <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
          <div>تایم‌لاین &mdash; <span id="tl-date" style="color:var(--accent2)"></span></div>
        </div>
        <div id="empty-msg" class="empty-msg"><div class="empty-icon">📅</div>هنوز فعالیتی ثبت نکرده‌اید</div>
        <div class="tl-wrap" id="timeline" style="display:none"></div>
      </div>
    </div>

    <!-- ================= تب 2: کارها و عادت‌ها ================= -->
    <div id="tab-habits" class="tab-section">
      <div class="card">
        <div class="card-title">کارهای روزانه (To-Do)</div>
        <div style="display:flex; gap:8px; margin-bottom: 15px;">
          <input type="text" id="todo-input" placeholder="مثلاً: خرید کتاب...">
          <button id="add-todo-btn" class="action-btn">افزودن</button>
        </div>
        <div id="todo-list"></div>
      </div>

      <div class="card">
        <div class="card-title">عادت‌ها (Habit Tracker)</div>
        <div style="display:flex; gap:8px; margin-bottom: 15px;">
          <input type="text" id="habit-input" placeholder="عادت جدید (مثلاً: ورزش صبحگاهی)">
          <button id="add-habit-btn" class="action-btn">افزودن</button>
        </div>
        <div id="habit-list"></div>
      </div>
    </div>

    <!-- ================= تب 3: ثبت و مدیریت ================= -->
    <div id="tab-add" class="tab-section">
      <div class="card">
        <div class="card-title">ثبت فعالیت جدید</div>
        <div class="form-group"><label>عنوان فعالیت</label><input type="text" id="act-title"></div>
        <div class="form-group"><label>تگ‌ها (اختیاری)</label><input type="text" id="act-tags" placeholder="#طراحی #پروژه"></div>
        <div class="form-group">
          <label>دسته‌بندی</label>
          <div class="cat-row"><select id="cat-select"></select><button class="btn-icon" id="toggle-cat">+</button></div>
          <div class="cat-manager" id="cat-manager"></div>
        </div>
        <div class="form-group">
          <label>زمان</label>
          <div class="time-row">
            <div class="time-field"><input type="text" id="start-time" placeholder="08:30"><button class="now-btn" id="btn-now-s">الان</button></div>
            <div class="time-field"><input type="text" id="end-time" placeholder="10:00"><button class="now-btn" id="btn-now-e">الان</button></div>
          </div>
        </div>
        <div class="form-group">
          <div style="display:flex; align-items:center; gap:8px; background:var(--surface2); padding:10px; border-radius:8px; border:1px solid var(--border2);">
            <input type="checkbox" id="pomodoro-toggle" style="width:16px; height:16px; accent-color:var(--accent);">
            <label for="pomodoro-toggle" style="margin:0; font-size:12px; color:var(--text);">فعال‌سازی آلارم پومودورو (۲۵ دقیقه کار)</label>
          </div>
        </div>
        <button class="btn-primary" id="add-btn">+ افزودن به تایم‌لاین</button>
        <button class="btn-live" id="live-btn">شروع فعالیت زنده</button>
        <div class="live-status" id="live-status"></div>
      </div>
    </div>

    <!-- ================= تب 4: گزارش‌ها ================= -->
    <div id="tab-reports" class="tab-section">
      <div class="card">
        <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
          <span>گزارش دوره‌ای موضوعات</span>
          <div style="display:flex; gap:6px; align-items:center;">
            <input type="text" id="report-days" value="7" style="width:36px; padding:4px; text-align:center; font-size:11px;">
            <button id="report-confirm-btn" class="action-btn">تایید</button>
          </div>
        </div>
        <div style="position:relative; height:200px; margin-bottom:20px;"><canvas id="report-chart"></canvas></div>
        <div id="report-grid"></div>
        <div class="total-line" id="total-line"></div>
        <button id="export-btn" class="btn-live" style="margin-top:20px;">💾 دانلود اطلاعات (Backup)</button>
      </div>

      <div class="card">
        <div class="card-title">نقشه ماهانه موضوع</div>
        <div class="map-controls">
          <select id="map-cat-select"></select>
          <div style="display:flex; gap:6px;">
            <button id="map-prev" class="btn-icon" style="width:30px;height:30px;">&#8249;</button>
            <div id="map-month-label" style="font-size:12px; color:var(--muted); line-height:30px; min-width:70px; text-align:center;"></div>
            <button id="map-next" class="btn-icon" style="width:30px;height:30px;">&#8250;</button>
          </div>
        </div>
        <div id="activity-map" class="activity-map"></div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="./js/planner.js"></script>
</body>
</html>
