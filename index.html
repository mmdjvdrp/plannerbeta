<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#111827">
<link class="apple-touch-icon" href="./icons/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقویم روزانه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">

<!-- استایل‌های بهینه‌سازی ریسپانسیو اختصاصی برای دستگاه‌های موبایل -->
<style>
/* تراز کردن بخش ناوبری هدر در دسکتاپ */
.date-nav {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}
.user-settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: flex-end;
  width: 100%;
}
.date-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  justify-content: flex-end;
}

/* اعمال استایل‌های واکنش‌گرا برای موبایل و تبلت */
@media(max-width: 768px) {
  body {
    padding: 12px 8px; /* پدینگ ملایم‌تر برای صفحه نمایش‌های کوچک */
  }
  .header {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .logo {
    font-size: 22px;
  }
  .date-nav {
    align-items: center;
    width: 100%;
    gap: 12px;
  }
  /* در موبایل ردیف تنظیمات کاربر کل عرض را پر کرده و از دو طرف تراز می‌شود */
  .user-settings-row {
    justify-content: space-between;
  }
  /* دکمه‌های تقویم در وسط موبایل قرار می‌گیرند */
  .date-controls {
    justify-content: center;
    width: 100%;
  }
  #date-label {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    padding: 6px 4px;
  }
  
  /* بهینه‌سازی بخش کارت‌ها در گوشی */
  .card {
    padding: 14px;
    border-radius: 12px;
  }
  .card-title {
    font-size: 10px;
    margin-bottom: 12px;
  }
  
  /* نقشه موضوعی ماهانه */
  .activity-map {
    gap: 4px;
  }
  .map-day {
    border-radius: 6px;
    font-size: 8px;
  }
  .map-day-num {
    top: 2px;
    inset-inline-start: 3px;
    font-size: 7px;
  }
  
  /* بهینه‌سازی المان‌های تایم‌لاین در موبایل */
  .tl-wrap {
    padding-right: 12px;
    margin-right: 4px;
  }
  .tl-item {
    padding: 8px 10px;
    gap: 8px;
  }
  .tl-title {
    font-size: 13px;
  }
  .tl-meta {
    gap: 4px;
  }
  .tl-badge {
    font-size: 9px;
    padding: 1px 5px;
  }
  .tl-time {
    font-size: 10px;
    padding: 1px 5px;
  }
  .tl-dur {
    font-size: 10px;
  }
  .btn-del {
    width: 26px;
    height: 26px;
    font-size: 11px;
    border-radius: 6px;
  }
}
</style>
</head>
<body>



<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      تقویم روزانه
    </div>
    
    <div class="date-nav">
      <!-- ردیف بالایی: اطلاعات کاربر، خروج و انتخاب تم -->
      <div class="user-settings-row">
        <div style="display:flex; align-items:center; gap:10px">
          <span id="welcome-msg" style="font-size:13px; color:var(--muted)"></span>
          <button id="logout-btn" style="
            padding:6px 14px;
            border-radius:8px;
            border:1px solid var(--border2);
            background:var(--surface2);
            color:var(--muted);
            cursor:pointer;
            font-family:Vazirmatn,sans-serif;
            font-size:12px;
          ">خروج</button>
        </div>
        <select id="theme-select" class="theme-select" title="تم">
          <option value="dark">دارک</option>
          <option value="light">لایت</option>
          <option value="forest">سبز</option>
          <option value="sunset">غروب</option>
        </select>
      </div>

      <!-- ردیف پایینی: کنترلر تغییر تاریخ و روز جاری -->
      <div class="date-controls">
        <button id="prev-day" title="روز قبل">&#8249;</button>
        <div id="date-label"></div>
        <button id="next-day" title="روز بعد">&#8250;</button>
        <button class="btn-today" id="btn-today">امروز</button>
      </div>
    </div>
  </div>

  <div class="grid">
    <!-- Left column -->
    <div>
      <!-- Add Event -->
      <div class="card">
        <div class="card-title">ثبت فعالیت جدید</div>
        <div class="form-group">
          <label>عنوان فعالیت</label>
         <input type="text" id="act-title" placeholder="عنوان فعالیت (اختیاری - پیش‌فرض: نام موضوع)">
        </div>
        <div class="form-group">
          <label>دسته‌بندی</label>
          <div class="cat-row">
            <select id="cat-select"></select>
            <button class="btn-icon" id="toggle-cat" title="دسته جدید">+</button>
          </div>
          <div class="new-cat-box" id="new-cat-box">
            <div class="new-cat-inner">
              <input type="text" id="new-cat-name" placeholder="نام دسته">
              <input type="color" id="new-cat-color" value="#7c5cfc">
              <button class="btn-save-cat" id="save-cat">ذخیره</button>
            </div>
          </div>
          <div class="cat-manager" id="cat-manager"></div>
        </div>
        <div class="form-group">
          <label>زمان شروع و پایان</label>
          <div class="time-row">
            <div class="time-field">
              <input type="text" id="start-time" placeholder="08:30" maxlength="5" autocomplete="off">
              <button class="now-btn" id="btn-now-s">الان</button>
            </div>
            <div class="time-field">
              <input type="text" id="end-time" placeholder="10:00" maxlength="5" autocomplete="off">
              <button class="now-btn" id="btn-now-e">الان</button>
            </div>
          </div>
          <div class="err-msg" id="time-err">⚠ فرمت صحیح: HH:MM مثلاً ۱۴:۳۰</div>
        </div>
        <!-- فیلد وقفه/پاز -->
        <div class="form-group">
          <label>مدت زمان وقفه / پاز (دقیقه - اختیاری)</label>
          <input type="text" id="pause-time" placeholder="مثلاً: ۳۰ (دقیقه)" maxlength="4" autocomplete="off">
        </div>
        <button class="btn-primary" id="add-btn">+ افزودن به تایم‌لاین</button>
        <button class="btn-primary" id="edit-cancel-btn" style="display:none; background:var(--surface3); color:var(--text); border:1px solid var(--border2); margin-top:8px;">انصراف از ویرایش</button>
        <button class="btn-live" id="live-btn">شروع / پایان با ساعت سیستم</button>
        <div class="live-status" id="live-status"></div>
      </div>

      <!-- Report -->
      <div class="card">
        <div class="card-title">گزارش ۷ روز گذشته</div>
        <div id="report-grid"></div>
        <div class="total-line" id="total-line">مجموع: <span>۰ ساعت</span></div>
      </div>

      <!-- Activity Map -->
      <div class="card">
        <div class="card-title">نقشه ماهانه موضوع</div>
        <div class="map-controls">
          <select id="map-cat-select"></select>
          <div class="map-month-nav">
            <button id="map-prev" title="ماه قبل">&#8249;</button>
            <div id="map-month-label"></div>
            <button id="map-next" title="ماه بعد">&#8250;</button>
          </div>
        </div>
        <div id="activity-map" class="activity-map"></div>
        <div class="map-summary" id="map-summary"></div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card" style="margin-bottom:0">
      <div class="card-title">
        تایم‌لاین &mdash; <span id="tl-date" style="color:var(--accent2)"></span>
      </div>
      <div id="empty-msg" class="empty-msg">
        <div class="empty-icon">📅</div>
        هنوز فعالیتی برای این روز ثبت نکرده‌اید
      </div>
      <div class="tl-wrap" id="timeline" style="display:none"></div>
    </div>
  </div>

</div>
<script type="module">
import { supabase } from "./js/supabase.js";

// ثبت Service Worker برای PWA
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then((reg) => console.log("Service Worker ثبت شد!", reg))
      .catch((err) => console.log("خطا در ثبت Service Worker:", err));
  });
}
  
async function saveCloud(){
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if(!user) return;
    
    const { error } = await supabase
      .from("planner_data")
      .upsert(
        {
          user_id: user.id,
          data: { events, cats, liveSession, theme }
        },
        { onConflict: 'user_id' }
      );

    if (error) {
      console.error("خطا در ذخیره‌سازی ابری:", error.message);
    }
  } catch (err) {
    console.error("خطای غیرمنتظره در ذخیره ابری:", err);
  }
}

async function loadCloud(){
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if(!user) return;

    const { data, error } = await supabase
      .from("planner_data")
      .select("data")
      .eq("user_id", user.id)
      .maybeSingle();

    if(data && data.data){
      const cloudData = data.data;
      events      = cloudData.events      || [];
      cats        = cloudData.cats        || [];
      theme       = cloudData.theme       || "dark";
      liveSession = cloudData.liveSession || null;

      save('planner_ev',    events);
      save('planner_cats',  cats);
      save('planner_live',  liveSession);
      save('planner_theme', theme);
    }
  } catch (err) {
    console.error("خطا در بارگذاری ابری اطلاعات:", err);
  }
}

const defaultCats = [];
function load(k, def){
  try{
    const v = localStorage.getItem(k);
    return v ? JSON.parse(v) : def;
  }catch{
    return def;
  }
}

function save(k, v){
  try{
    localStorage.setItem(k, JSON.stringify(v));
  }catch{}
}

let events = load('planner_ev', []);
let cats   = load('planner_cats', defaultCats);
let curDate= new Date().toISOString().split('T')[0];
let mapMonth = curDate.slice(0,7);
let liveSession = load('planner_live', null);
let theme = load('planner_theme', 'dark');
let editingEventId = null;

function applyTheme(){
  document.body.dataset.theme=theme;
  const sel=document.getElementById('theme-select');
  if(sel) sel.value=theme;
}

function getCat(id){ return cats.find(c=>c.id===id) || {name:'موضوع حذف‌شده', color:'#9ca3af'}; }

function getNow(){
  const n=new Date();
  return pad(n.getHours())+':'+pad(n.getMinutes());
}
function pad(n){ return String(n).padStart(2,'0'); }

function parseTime(s){
  s=(s||'').trim();
  if(/^\d{4}$/.test(s)) s=s.slice(0,2)+':'+s.slice(2);
  const m=s.match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  const h=+m[1], mn=+m[2];
  if(h>23||mn>59) return null;
  return h*60+mn;
}

function fmtTime(mins){
  return pad(Math.floor(mins/60))+':'+pad(mins%60);
}

function fmtDur(mins){
  const h=Math.floor(mins/60), m=mins%60;
  if(h===0) return m+'m';
  if(m===0) return h+'h';
  return h+'h '+m+'m';
}

function fmtDateLabel(d){
  const [y,mo,day]=d.split('-').map(Number);
  const dt=new Date(y, mo-1, day);
  const days=['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
  const months=['ژانویه','فوریه','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپتامبر','اکتبر','نوامبر','دسامبر'];
  return days[dt.getDay()]+' '+day+' '+months[mo-1]+' '+y;
}

function shiftDay(n){
  const [y,mo,d]=curDate.split('-').map(Number);
  const dt=new Date(y,mo-1,d);
  dt.setDate(dt.getDate()+n);
  curDate=dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());
  render();
}

function renderCats(){
  const sel=document.getElementById('cat-select');
  const mapSel
