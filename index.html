<!-- قرار دادن چک‌باکس فوق در داخل تب ۵ (tab-reports) دقیقاً بالای تگ دیو چارت (report-chart) -->
<div id="tab-reports" class="tab-section">
  <div class="card">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:8px;">
      <span>گزارش دوره‌ای موضوعات</span>
      <div style="display:flex; gap:6px; align-items:center;">
        <select id="report-chart-type" style="width: auto; padding: 4px; font-size: 11px; height: 28px; border-radius: 6px; background:var(--surface2); color:var(--text); border:1px solid var(--border2);">
          <option value="doughnut">دایره‌ای (Doughnut)</option>
          <option value="bar">ستونی (Bar)</option>
          <option value="line">خطی (Line)</option>
        </select>
        <input type="text" id="report-days" value="7" style="width:36px; padding:4px; text-align:center; font-size:11px; height:28px;">
        <button id="report-confirm-btn" class="action-btn" style="height:28px; padding:0 8px;">تایید</button>
      </div>
    </div>
    
    <!-- گزینه فیلتر همگانی نمودار -->
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; background:var(--surface2); padding:8px 12px; border-radius:8px; border:1px solid var(--border2);">
      <input type="checkbox" id="report-select-all" style="width:16px; height:16px; accent-color:var(--accent); cursor:pointer;">
      <label for="report-select-all" style="margin:0; font-size:12px; color:var(--text); cursor:pointer; font-weight:700; user-select:none;">انتخاب همه موضوعات در نمودار</label>
    </div>

    <div style="position:relative; height:220px; margin-bottom:20px;"><canvas id="report-chart"></canvas></div>
    <div id="report-grid"></div>
    <div class="total-line" id="total-line"></div>
  </div>
