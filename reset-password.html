<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>درخواست بازیابی رمز عبور</title>

  <style>
    body {
      font-family: Vazirmatn, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .box {
      width: 90%;         
      max-width: 350px;   
      background: #1f2937;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
      outline: none;
      font-family: inherit;
    }
    input:focus {
      border-color: #7c5cfc;
    }

    button {
      width: 100%;
      padding: 12px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #7c5cfc;
      color: white;
      font-family: Vazirmatn, sans-serif;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #6a4ce2;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .err { 
      color: #f87171; 
      font-size: 13px; 
      margin-top: -10px; 
      margin-bottom: 10px; 
      display: none; 
    }
    .success { 
      color: #34d399; 
      font-size: 13px; 
      margin-top: -10px; 
      margin-bottom: 10px; 
      display: none; 
      line-height: 1.6;
    }
    a {
      color: #7c5cfc;
      text-decoration: none;
      font-size: 13px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 style="margin-bottom:20px; text-align: center;">بازیابی رمز عبور</h2>

  <form id="request-section" onsubmit="return false;">
    <p style="font-size: 13px; color: #9ca3af; margin-bottom: 15px; line-height: 1.6;">
      ایمیل خود را وارد کنید تا لینک بازیابی رمز عبور برای شما ارسال شود.
    </p>
    
    <label for="reset-email">ایمیل</label>
    <input id="reset-email" type="email" placeholder="example@email.com" required style="direction: ltr;">
    
    <div class="err" id="request-err"></div>
    <div class="success" id="request-success"></div>
    
    <button id="request-btn" type="submit">ارسال لینک بازیابی</button>
    
    <div style="text-align: center; margin-top: 15px;">
      <a href="./login.html">بازگشت به صفحه ورود</a>
    </div>
  </form>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  document.getElementById("request-section").onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById("reset-email").value.trim();
    const err = document.getElementById("request-err");
    const success = document.getElementById("request-success");
    const btn = document.getElementById("request-btn");
    
    err.style.display = "none";
    success.style.display = "none";

    try {
      btn.disabled = true;
      btn.textContent = "در حال ارسال...";
      
      // آدرس بازگشت کاربر پس از کلیک روی لینک ایمیل به فایل جدید تغییر رمز تغییر پیدا کرد
      const redirectToUrl = window.location.origin + "/update-password.html";
      
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: redirectToUrl,
      });
      
      if (error) throw error;

      success.textContent = "لینک بازیابی با موفقیت ارسال شد. لطفاً صندوق ورودی خود را بررسی کنید.";
      success.style.display = "block";
    } catch (error) {
      err.textContent = "خطا: " + error.message;
      err.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "ارسال لینک بازیابی";
    }
  };
</script>

</body>
</html>
