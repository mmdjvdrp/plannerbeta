<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت رمز عبور جدید</title>

  <style>
    body {
      font-family: Vazirmatn, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .box {
      width: 90%;         
      max-width: 350px;   
      background: #1f2937;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
      outline: none;
      font-family: inherit;
    }
    input:focus {
      border-color: #7c5cfc;
    }

    button {
      width: 100%;
      padding: 12px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #7c5cfc;
      color: white;
      font-family: Vazirmatn, sans-serif;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #6a4ce2;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .err { 
      color: #f87171; 
      font-size: 13px; 
      margin-top: -10px; 
      margin-bottom: 10px; 
      display: none; 
    }
    .success { 
      color: #34d399; 
      font-size: 13px; 
      margin-top: -10px; 
      margin-bottom: 10px; 
      display: none; 
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 style="margin-bottom:20px; text-align: center;">تغییر رمز عبور</h2>

  <form id="update-form" onsubmit="return false;">
    <p style="font-size: 13px; color: #9ca3af; margin-bottom: 15px; line-height: 1.6;">
      رمز عبور جدید خود را وارد کنید.
    </p>
    
    <label for="new-password">رمز عبور جدید</label>
    <input id="new-password" type="password" placeholder="حداقل ۶ کاراکتر" required minlength="6">

    <label for="confirm-password">تکرار رمز عبور جدید</label>
    <input id="confirm-password" type="password" placeholder="تکرار رمز عبور جدید" required minlength="6">
    
    <div class="err" id="update-err"></div>
    <div class="success" id="update-success"></div>
    
    <button id="update-btn" type="submit">ثبت رمز عبور جدید</button>
  </form>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  // بررسی وجود توکن دسترسی در آدرس برای اطمینان از صحت دسترسی کاربر
  const hash = window.location.hash || "";
  if (!hash.includes("access_token")) {
    document.getElementById("update-err").textContent = "لینک بازیابی نامعتبر یا منقضی شده است. لطفا دوباره تلاش کنید.";
    document.getElementById("update-err").style.display = "block";
    document.getElementById("update-btn").disabled = true;
  }

  document.getElementById("update-form").onsubmit = async (e) => {
    e.preventDefault();
    const password = document.getElementById("new-password").value;
    const confirmPassword = document.getElementById("confirm-password").value;
    const err = document.getElementById("update-err");
    const success = document.getElementById("update-success");
    const btn = document.getElementById("update-btn");
    
    err.style.display = "none";
    success.style.display = "none";

    if (password.length < 6) {
      err.textContent = "رمز عبور باید حداقل ۶ کاراکتر باشد.";
      err.style.display = "block";
      return;
    }

    if (password !== confirmPassword) {
      err.textContent = "رمز عبور با تکرار آن همخوانی ندارد.";
      err.style.display = "block";
      return;
    }

    try {
      btn.disabled = true;
      btn.textContent = "در حال ثبت...";
      
      const { error } = await supabase.auth.updateUser({ password: password });
      
      if (error) throw error;

      success.textContent = "رمز عبور با موفقیت تغییر کرد. در حال انتقال به صفحه ورود...";
      success.style.display = "block";
      
      setTimeout(() => {
        window.location.href = "./login.html";
      }, 3000);
    } catch (error) {
      err.textContent = "خطا: " + error.message;
      err.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "ثبت رمز عبور جدید";
    }
  };
</script>

</body>
</html>
